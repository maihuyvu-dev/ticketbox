services:
  # 1. PostgreSQL - Trái tim giao dịch
  postgres:
    image: postgres:15-alpine
    container_name: ticketbox_postgres
    restart: always
    env_file:
      - ../../.env
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # Tự động chạy script tạo bảng khi start lần đầu
    healthcheck:
      test: [CMD-SHELL, pg_isready -U -d ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis - Bộ nhớ đệm & Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: ticketbox_redis
    restart: always
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning # Lưu data mỗi 60s nếu có 1 thay đổi
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 5

  # 3. RabbitMQ - Xử lý Async (Kèm giao diện Web UI)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ticketbox_rabbitmq
    restart: always
    ports:
      - 5672:5672   # Port để Spring Boot kết nối
      - 15672:15672 # Port truy cập Web UI Dashboard
    environment:
      RABBITMQ_DEFAULT_USER: ticketbox
      RABBITMQ_DEFAULT_PASS: ticketbox
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [CMD, rabbitmq-diagnostics, ping]
      interval: 10s
      timeout: 5s
      retries: 5

# Khai báo Volumes để dữ liệu không bị mất khi tắt Docker
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
